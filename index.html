<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gray 作品集</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        #fallback {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            color: #4FACFE;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            padding: 40px;
        }
        #fallback a {
            color: #4FACFE;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <!-- Google Docs Viewer 嵌入方式（兼容性最好） -->
    <iframe 
        src="https://docs.google.com/gview?url=https://gui-ni.github.io/gray-portfolio/portfolio.pdf&embedded=true&hl=zh_CN"
        style="width:100%;height:100%;border:none;"
        allowfullscreen
        webkitallowfullscreen
    ></iframe>

    <!-- 备用：如果 Google Viewer 加载失败，显示下载链接 -->
    <div id="fallback">
        <div style="font-size:20px;font-weight:600;">无法在线预览</div>
        <div style="font-size:14px;color:#888;margin-top:8px;">请长按下方链接复制到浏览器打开</div>
        <a href="https://gui-ni.github.io/gray-portfolio/portfolio.pdf" 
           style="font-size:12px;color:#4FACFE;word-break:break-all;margin-top:16px;display:block;max-width:90%;">
            https://gui-ni.github.io/gray-portfolio/portfolio.pdf
        </a>
        <div style="margin-top:24px;font-size:12px;color:#555;">作品集大小约 7.3 MB</div>
    </div>

    <script>
        // 检测 iframe 是否加载成功，3秒后若内容为空显示备用方案
        setTimeout(function() {
            var iframe = document.querySelector('iframe');
            try {
                // 尝试检测 iframe 内容
                var doc = iframe.contentDocument || iframe.contentWindow.document;
                if (!doc || doc.body.innerHTML.length < 100) {
                    document.getElementById('fallback').style.display = 'flex';
                    iframe.style.display = 'none';
                }
            } catch(e) {
                // 跨域无法访问iframe内容，依赖用户操作
            }
        }, 3000);
    </script>
</body>
</html>
